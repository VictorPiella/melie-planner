name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # allow manual re-deploy from the Actions tab

# Allow the workflow to write to gh-pages and publish via the Pages API
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; don't cancel in-progress so a partial deploy finishes
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (demo mode — no Mealie credentials needed)
        run: npm run build
        env:
          # Set the sub-path so assets resolve correctly on GitHub Pages.
          # Change this if your repo has a different name.
          VITE_BASE_PATH: /mealie-planner/
          # No VITE_MEALIE_URL / VITE_MEALIE_TOKEN → app shows built-in sample recipes

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
